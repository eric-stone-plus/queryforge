<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200" viewBox="0 0 960 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#79c0ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="200" rx="12" fill="url(#bg)"/>
  <!-- Q icon -->
  <circle cx="60" cy="100" r="36" fill="none" stroke="url(#accent)" stroke-width="4"/>
  <circle cx="60" cy="100" r="8" fill="#58a6ff"/>
  <line x1="78" y1="118" x2="98" y2="138" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <!-- Title -->
  <text x="120" y="90" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="42" font-weight="700" fill="#e6edf3">QueryForge</text>
  <!-- Subtitle -->
  <text x="122" y="120" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" fill="#8b949e">让业务部门自助取数，解放数据分析师的重复需求</text>
  <!-- Tags -->
  <rect x="122" y="138" width="80" height="22" rx="11" fill="#1f6feb22" stroke="#1f6feb44" stroke-width="1"/>
  <text x="162" y="153" font-family="-apple-system,sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">Next.js</text>
  <rect x="212" y="138" width="80" height="22" rx="11" fill="#1f6feb22" stroke="#1f6feb44" stroke-width="1"/>
  <text x="252" y="153" font-family="-apple-system,sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">TypeScript</text>
  <rect x="302" y="138" width="80" height="22" rx="11" fill="#1f6feb22" stroke="#1f6feb44" stroke-width="1"/>
  <text x="342" y="153" font-family="-apple-system,sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">MiMo AI</text>
  <rect x="392" y="138" width="80" height="22" rx="11" fill="#1f6feb22" stroke="#1f6feb44" stroke-width="1"/>
  <text x="432" y="153" font-family="-apple-system,sans-serif" font-size="11" fill="#58a6ff" text-anchor="middle">SQLite</text>
  <!-- Right: mini chart -->
  <g transform="translate(680, 40)" opacity="0.4">
    <rect x="0" y="80" width="28" height="60" rx="4" fill="#58a6ff"/>
    <rect x="40" y="50" width="28" height="90" rx="4" fill="#58a6ff"/>
    <rect x="80" y="70" width="28" height="70" rx="4" fill="#58a6ff"/>
    <rect x="120" y="30" width="28" height="110" rx="4" fill="#58a6ff"/>
    <rect x="160" y="55" width="28" height="85" rx="4" fill="#58a6ff"/>
    <rect x="200" y="40" width="28" height="100" rx="4" fill="#58a6ff"/>
    <rect x="240" y="65" width="28" height="75" rx="4" fill="#58a6ff"/>
    <!-- trend line -->
    <polyline points="14,80 54,50 94,70 134,30 174,55 214,40 254,65" fill="none" stroke="#79c0ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
